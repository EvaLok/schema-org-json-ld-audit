name: Orchestrator

on:
  issues:
    types: [opened]

jobs:
  orchestrate:
    if: contains(github.event.issue.labels.*.name, 'orchestrator-run')
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      CLAUDE_CODE_EFFORT_LEVEL: max
    permissions:
      contents: write
      issues: write
      pull-requests: read
      id-token: write

    steps:
      - name: Checkout audit repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUDIT_ORCHESTRATOR_PAT }}
          fetch-depth: 0

      - name: Install Rust toolchain
        if: hashFiles('tools/rust/Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        if: hashFiles('tools/rust/Cargo.toml') != ''
        uses: actions/cache@v4
        with:
          path: |
            tools/rust/target
            ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('tools/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Rust tools
        if: hashFiles('tools/rust/Cargo.toml') != ''
        run: cargo build --release --manifest-path tools/rust/Cargo.toml

      - name: Load system prompt
        id: prompt
        run: |
          {
            echo "content<<PROMPT_EOF"
            cat .github/workflows/orchestrator-prompt.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Audit Orchestrator
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.AUDIT_ORCHESTRATOR_PAT }}
          prompt: ${{ steps.prompt.outputs.content }}
          claude_args: |
            --model claude-opus-4-6
          settings: |
            {
              "permissions": {
                "allow": [
                  "Edit",
                  "Write",
                  "Bash(gh *)",
                  "Bash(git *)",
                  "Bash(jq *)",
                  "Bash(bash *)",
                  "Bash(cargo *)",
                  "Bash(mkdir *)",
                  "Bash(ls *)",
                  "Bash(date *)",
                  "Bash(wc *)",
                  "Bash(sort *)",
                  "Bash(cat *)",
                  "Bash(head *)",
                  "Bash(tail *)",
                  "WebFetch(domain:schema.org)",
                  "WebFetch(domain:developers.google.com)",
                  "WebFetch(domain:search.google.com)"
                ]
              }
            }
